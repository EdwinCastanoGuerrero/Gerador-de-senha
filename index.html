<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen">
    
    <div class="flex items-center justify-center min-h-screen p-4">
        
        <div class="bg-white/90 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl w-full max-w-2xl p-8 mx-4 transform hover:scale-105 transition-all duration-300">
            
            <p class="text-3xl mb-4 text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 font-bold text-center">Gerador de Senha</p>

            <hr class="border-gradient-to-r from-purple-400 to-pink-400 mb-6" />

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                
                <div class="flex items-center">
                    <p class="text-slate-700 text-lg mr-3 font-medium">Tamanho:</p>
                    <input type="number" id="password_length" class="bg-gradient-to-r from-blue-50 to-purple-50 text-slate-800 border-2 border-purple-300 rounded-lg p-3 focus:ring-4 focus:ring-purple-200 focus:border-purple-500 transition-all duration-200" placeholder="8" value="8"/>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="check_lowercase" class="w-5 h-5 text-purple-600 bg-gray-100 border-gray-300 rounded focus:ring-purple-500 focus:ring-2">
                    <label for="check_lowercase" class="text-slate-700 text-lg ml-3 font-medium">Minúsculas</label>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="check_uppercase" class="w-5 h-5 text-purple-600 bg-gray-100 border-gray-300 rounded focus:ring-purple-500 focus:ring-2">
                    <label for="check_uppercase" class="text-slate-700 text-lg ml-3 font-medium">Maiúsculas</label>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="check_digits" class="w-5 h-5 text-purple-600 bg-gray-100 border-gray-300 rounded focus:ring-purple-500 focus:ring-2">
                    <label for="check_digits" class="text-slate-700 text-lg ml-3 font-medium">Algarismos</label>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="check_symbols" class="w-5 h-5 text-purple-600 bg-gray-100 border-gray-300 rounded focus:ring-purple-500 focus:ring-2">
                    <label for="check_symbols" class="text-slate-700 text-lg ml-3 font-medium">Símbolos</label>
                </div>

            </div>

            <hr class="border-gradient-to-r from-purple-400 to-pink-400 my-6" />

            <div class="bg-gradient-to-r from-slate-700 to-slate-900 border-2 border-slate-600 rounded-2xl text-white text-4xl font-mono text-center py-4 px-6 shadow-inner" id="password">
                [Senha]
            </div>

            <div class="flex flex-col sm:flex-row gap-4 mt-6">
                <button class="bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white p-4 px-8 text-center border-0 rounded-xl cursor-pointer transform hover:scale-110 transition-all duration-300 shadow-lg hover:shadow-xl font-semibold" id="btn_generate_password">Gerar Senha</button>
                <button class="bg-gradient-to-r from-orange-400 to-red-500 hover:from-orange-500 hover:to-red-600 text-white p-4 px-8 text-center border-0 rounded-xl cursor-pointer transform hover:scale-110 transition-all duration-300 shadow-lg hover:shadow-xl font-semibold" id="btn_copy_to_clipboard">Copiar para Clipboard</button>
            </div>

        </div>

      </div>

      <script src="script.js"></script>

</body>
